<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Secret Between Us</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- COVER -->

    <section id="cover-screen">

        <div class="cover-card">

            <h1>❤️ The Secret Between Us</h1>

            <p>
                A Mystery Couple Challenge
            </p>

            <div class="cover-info">

                <div>
                    ⏱ 25 Questions
                </div>

                <div>
                    ❤️ Compatibility Score
                </div>

                <div>
                    🎯 Mystery Ending
                </div>

            </div>

            <button id="start-btn">
                Start Challenge
            </button>

        </div>

    </section>

    <!-- QUIZ -->

    <section id="quiz-screen" class="hidden">

        <div class="quiz-container">

            <!-- HEADER -->

            <div class="top-bar">

                <div id="question-counter">
                    Question 1 / 25
                </div>

                <div id="timer">
                    10
                </div>

            </div>

            <!-- PROGRESS -->

            <div class="progress-container">

                <div id="progress-bar"></div>

            </div>

            <!-- QUESTION -->

            <div class="question-box">

                <h2 id="question-text">

                </h2>

            </div>

            <!-- ANSWER -->

            <textarea
                id="answer-input"
                placeholder="Type your answer here..."
            ></textarea>

            <button id="next-btn">
                Next Question →
            </button>

        </div>

    </section>

    <!-- RESULT -->

    <section id="result-screen" class="hidden">

        <div class="result-card">

            <h1>🎉 Challenge Complete</h1>

            <div id="final-score">

            </div>

            <div id="compatibility-result">

            </div>

            <div id="final-message">

            </div>

            <button onclick="restartQuiz()">
                Play Again
            </button>

        </div>

    </section>

    <!-- AUDIO -->

    <audio id="click-sound">
        <source src="assets/click.mp3" type="audio/mpeg">
    </audio>

    <audio id="finish-sound">
        <source src="assets/finish.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>

</html>
